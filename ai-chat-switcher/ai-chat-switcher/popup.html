<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      background: #1e1e2e;
      color: #e2e2e2;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 12px;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #a5b4fc;
      text-align: center;
    }
    .link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      color: #e2e2e2;
      font-size: 13px;
      transition: background 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .link-item:hover { background: rgba(255,255,255,0.08); }
    .link-icon {
      width: 24px; height: 24px; border-radius: 6px;
      object-fit: contain;
    }
    .footer {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>⚡ AI Switcher</h2>

  <button class="link-item" data-url="https://gemini.google.com/app?hl=zh-cn">
    <img class="link-icon" src="https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d4735304ff6292a690b6.svg" alt="Gemini">
    <span>Gemini</span>
  </button>

  <button class="link-item" data-url="https://www.doubao.com/chat/">
    <img class="link-icon" src="https://lf-flow-web-cdn.doubao.com/obj/flow-doubao/doubao/logo-icon-white-bg.png" alt="豆包">
    <span>豆包</span>
  </button>

  <button class="link-item" data-url="https://github.com/copilot">
    <img class="link-icon" src="https://github.githubassets.com/favicons/favicon-dark.svg" alt="GitHub Copilot">
    <span>GitHub Copilot</span>
  </button>

  <div class="footer">在当前标签页中切换</div>

  <script>
    document.querySelectorAll('.link-item').forEach((btn) => {
      btn.addEventListener('click', () => {
        const url = btn.dataset.url;
        chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
          if (tabs[0]) {
            chrome.tabs.update(tabs[0].id, { url: url });
          }
        });
        window.close();
      });
    });
  </script>
</body>
</html>
